<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업활동 제출 — 한화생명 법인사업부</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #f5f5f3;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem 4rem;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 28px 24px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.logo { font-size: 12px; color: #aaa; letter-spacing: .04em; margin-bottom: 10px; }
h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 3px; }
.week-label { font-size: 13px; color: #999; margin-bottom: 20px; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.chip {
  background: #e8f4ef;
  color: #1a7a5e;
  font-size: 13px;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 20px;
}
hr { border: none; border-top: 1px solid #f0f0ee; margin: 20px 0; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 13px;
  color: #555;
  margin-bottom: 7px;
  font-weight: 500;
}
.field input[type=number],
.field input[type=date] {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid #e0e0de;
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  color: #111;
  background: #fafaf9;
  -webkit-appearance: none;
}
.field input:focus {
  outline: none;
  border-color: #1a7a5e;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(26,122,94,.1);
}
.score-box {
  background: #f5f5f3;
  border-radius: 12px;
  padding: 14px 18px;
  margin: 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.score-box .label { font-size: 14px; color: #666; }
.score-box .target { font-size: 12px; color: #aaa; margin-top: 2px; }
.score-val { font-size: 24px; font-weight: 700; color: #c03a2b; transition: color .2s; }
.score-val.good { color: #1a7a5e; }
.btn {
  width: 100%;
  padding: 14px;
  background: #1a7a5e;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
}
.btn:hover { opacity: .9; }
.btn:disabled { background: #ccc; cursor: not-allowed; opacity: 1; }
.error-msg { color: #c03a2b; font-size: 13px; margin-top: 12px; text-align: center; }

/* 완료 화면 */
.success {
  text-align: center;
  padding: 32px 0;
}
.success .icon {
  width: 64px; height: 64px;
  background: #e8f4ef;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 30px;
}
.success h2 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 8px; }
.success .score-big { font-size: 36px; font-weight: 700; color: #1a7a5e; margin: 8px 0; }
.success p { font-size: 14px; color: #888; line-height: 1.6; }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="logo">한화생명 법인사업부</div>
  <h1>영업활동 제출</h1>
  <div class="week-label" id="week-label">주차 계산 중...</div>
  <div class="chips" id="chips"></div>
  <hr>
  <form id="main-form">
    <div class="field">
      <label>활동 일자 *</label>
      <input type="date" id="actDate" required>
    </div>
    <div class="field">
      <label>1) 신규 사업장 및 고객 발굴 건수 *</label>
      <input type="number" id="countNew" min="0" value="0" required oninput="calcScore()">
    </div>
    <div class="field">
      <label>2) 펀드 상담 및 제안 건수 *</label>
      <input type="number" id="countFund" min="0" value="0" required oninput="calcScore()">
    </div>
    <div class="field">
      <label>3) 기존 단체 관리 건수 *</label>
      <input type="number" id="countMgmt" min="0" value="0" required oninput="calcScore()">
    </div>
    <div class="score-box">
      <div>
        <div class="label">예상 합산점수</div>
        <div class="target">주간 목표: 20점</div>
      </div>
      <div class="score-val" id="score-val">0점</div>
    </div>
    <button type="submit" class="btn" id="submit-btn">제출하기</button>
    <div class="error-msg" id="error-msg"></div>
  </form>
</div>

<script>
// ★ Apps Script Web App 배포 후 아래 URL로 교체 ★
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIYOlk1xXVCuGZAstkjSApzPSB4fo9RCGi0ABtBQ5GTSxkcdnkKPFd2dAzOHKIoN9d/exec';

// URL 파라미터 읽기
const params = new URLSearchParams(location.search);
const name = params.get('name') || '미지정';
const org  = params.get('org')  || '';
const role = params.get('role') || '팀장';

// 이름/소속/직책 칩 표시
const chipsEl = document.getElementById('chips');
[name, org, role].filter(Boolean).forEach(t => {
  const s = document.createElement('span');
  s.className = 'chip';
  s.textContent = t;
  chipsEl.appendChild(s);
});

// 오늘 날짜 기본값
const today = new Date();
const todayStr = today.toLocaleDateString('sv-SE'); // YYYY-MM-DD
document.getElementById('actDate').value = todayStr;

// 주차 계산
function getWeekStr(d) {
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const w1 = new Date(date.getFullYear(), 0, 4);
  const wn = 1 + Math.round(((date - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
  return `${date.getFullYear()}-W${String(wn).padStart(2,'0')}`;
}
document.getElementById('week-label').textContent = getWeekStr(today) + ' 주차';

// 점수 계산
function calcScore() {
  const a = parseInt(document.getElementById('countNew').value)  || 0;
  const b = parseInt(document.getElementById('countFund').value) || 0;
  const c = parseInt(document.getElementById('countMgmt').value) || 0;
  const score = a * 3 + b * 2 + c;
  const el = document.getElementById('score-val');
  el.textContent = score + '점';
  el.className = 'score-val' + (score >= 20 ? ' good' : '');
}

// 제출
document.getElementById('main-form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '제출 중...';
  document.getElementById('error-msg').textContent = '';

  const countNew  = parseInt(document.getElementById('countNew').value)  || 0;
  const countFund = parseInt(document.getElementById('countFund').value) || 0;
  const countMgmt = parseInt(document.getElementById('countMgmt').value) || 0;
  const totalScore = countNew * 3 + countFund * 2 + countMgmt;

  const data = { name, org, role,
    actDate: document.getElementById('actDate').value,
    countNew, countFund, countMgmt };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(data).toString()
    });

    document.getElementById('app').innerHTML = `
      <div class="success">
        <div class="icon">✅</div>
        <h2>제출 완료!</h2>
        <div class="score-big">${totalScore}점</div>
        <p>${name} 팀장님의 활동이 기록되었습니다.<br>수고하셨습니다! 🎉</p>
      </div>`;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '제출하기';
    document.getElementById('error-msg').textContent = '오류가 발생했습니다. 다시 시도해주세요.';
  }
});
</script>
</body>
</html>
